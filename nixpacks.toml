# Nixpacks build hints for the panda bot.
#
# Music playback needs both ffmpeg (audio decode) and yt-dlp (YouTube
# resolver). Nixpacks auto-detects Node, but external CLIs need to be
# declared explicitly. yt-dlp is a Python wheel — we install it via pip
# so we get the latest, since YouTube's anti-scrape changes weekly and
# the apt package lags.

[phases.setup]
aptPkgs = ["...", "ffmpeg", "python3", "python3-pip"]

[phases.install]
cmds = [
  "pip3 install --break-system-packages -U yt-dlp",
  "npm ci",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
